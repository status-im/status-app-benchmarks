<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swap — Status App Benchmarks</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f8fa;
      --card: #ffffff;
      --text: #1f2328;
      --muted: #656d76;
      --border: #d0d7de;
      --link: #0969da;
      --header-bg: #24292f;
      --header-text: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --text: #e6edf3;
        --muted: #8b949e;
        --border: #30363d;
        --link: #58a6ff;
        --header-bg: #010409;
        --header-text: #e6edf3;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1.25rem 1.5rem;
    }
    header a { color: var(--header-text); text-decoration: none; }
    header a:hover { text-decoration: underline; }
    main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
    .subtitle { color: var(--muted); margin: 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--link); }
    .card h2 { margin: 0 0 0.5rem; font-size: 1.1rem; }
    .card p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    section.chart {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    section.chart h2 { margin: 0 0 0.75rem; font-size: 1.05rem; }
    section.chart iframe {
      width: 100%;
      height: 540px;
      border: 0;
      border-radius: 4px;
      background: #fff;
      display: block;
    }
    .chart-footnote {
      color: var(--muted);
      font-size: 0.85rem;
      margin: 0.5rem 0 0;
    }
    .note { color: var(--muted); font-size: 0.9rem; margin: 1rem 0 0; }
    nav.back { margin-bottom: 1rem; }
    nav.back a { color: var(--link); text-decoration: none; }
    nav.back a:hover { text-decoration: underline; }
    section.machine-info {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin: 1rem 0 1.5rem;
      font-size: 0.95rem;
    }
    section.machine-info h2 {
      margin: 0 0 0.5rem;
      font-size: 1.05rem;
    }
    section.machine-info dl {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.5rem 1.5rem;
      margin: 0;
    }
    section.machine-info dt {
      margin: 0;
      color: var(--muted);
      font-size: 0.85rem;
    }
    section.machine-info dd {
      margin: 0.1rem 0 0;
      font-weight: 500;
    }
    </style>
</head>
<body>
  <header><a href="index.html">Status App Benchmarks</a></header>
  <main><nav class="back"><a href="index.html">← Dashboard</a></nav><h1>Swap</h1><p class="subtitle">Swap modal load time.</p><section class="chart"><h2>Swap Screen Loading Time Performance</h2><iframe src="charts/swap_loading_time.html" title="Interactive chart" loading="lazy"></iframe><p class="chart-footnote">Each point = average of runs on that build.</p></section></main>
</body>
</html>
