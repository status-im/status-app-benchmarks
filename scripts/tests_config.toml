# Benchmark Configuration
# Each account variant gets its own chart (fresh / wallet_load / wallet_load_alex).

[defaults]
slow_threshold_s = 1.0
fast_threshold_s = 0.5
regression_pct = 0.15
regression_consecutive = 3
rolling_window = 5
backlog_slow_of_last_n = 5
backlog_slow_min_count = 3

# --- Pages ---

[[pages]]
slug = "wallet-fresh"
title = "Wallet — Fresh account"
description = "Load times for a newly onboarded account (no pre-seeded user data)."
test_ids = [
    "test_wallet_loading_time_fresh",
    "test_wallet_assets_loading_time_fresh",
    "test_swap_loading_time_fresh",
]

[[pages]]
slug = "wallet-wallet-load"
title = "Wallet — wallet_load profile"
description = "Returning user with wallet_load profile (~29 MB user data)."
test_ids = [
    "test_wallet_loading_time_wallet_load",
    "test_wallet_assets_loading_time_wallet_load",
    "test_swap_loading_time_wallet_load",
]

[[pages]]
slug = "wallet-wallet-load-alex"
title = "Wallet — wallet_load_alex profile"
description = "Returning user with wallet_load_alex profile (~16 MB user data)."
test_ids = [
    "test_wallet_loading_time_wallet_load_alex",
    "test_wallet_assets_loading_time_wallet_load_alex",
    "test_swap_loading_time_wallet_load_alex",
]

[[pages]]
slug = "community-populated"
title = "Community — status_community_member profile"
description = "Returning user with Status community already joined."
test_ids = [
    "test_status_community_first_open_loading_time_member",
    "test_status_community_second_open_loading_time_member",
    "test_status_community_first_open_cpu_member",
    "test_status_community_second_open_cpu_member",
    "test_status_community_first_open_ram_member",
    "test_status_community_second_open_ram_member",
]

# --- Wallet load time (3 variants) ---

[[tests]]
test_id = "test_wallet_loading_time_fresh"
display_name = "Desktop — Wallet load time"
description = "Time from opening Wallet until the screen is drawn · lower is better"
pattern = "test_wallet_loading_time[fresh_user]"
graph_filename = "wallet_loading_time_fresh.png"
ylabel = "seconds"
footnote = "Fresh account · each point = average of 5 runs on that build"

[[tests]]
test_id = "test_wallet_loading_time_wallet_load"
display_name = "Desktop — Wallet load time"
description = "Time from opening Wallet until the screen is drawn · lower is better"
pattern = "test_wallet_loading_time[wallet_load_user]"
graph_filename = "wallet_loading_time_wallet_load.png"
ylabel = "seconds"
footnote = "wallet_load profile · each point = average of 5 runs on that build"

[[tests]]
test_id = "test_wallet_loading_time_wallet_load_alex"
display_name = "Desktop — Wallet load time"
description = "Time from opening Wallet until the screen is drawn · lower is better"
pattern = "test_wallet_loading_time[wallet_load_alex_user]"
graph_filename = "wallet_loading_time_wallet_load_alex.png"
ylabel = "seconds"
footnote = "wallet_load_alex profile · each point = average of 5 runs on that build"

