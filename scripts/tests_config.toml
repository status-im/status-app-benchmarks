[[tests]]
test_id = "test_android_settings_response_time"
display_name = "Android — Settings navigation response time"
graph_filename = "android_settings_response_time.png"
pattern = "test_android_settings_response_time"
ylabel = "seconds"
unit = "s"
x_axis = "build"
target = 2.0
description = "Time from tapping “Settings” in the nav bar until the Settings screen is drawn  ·  lower is better"
footnote = "Fresh account · Samsung A36 · each point = mean of 6 runs on that build"

